model_params:
  name: 'ConditionalVAE'
  latent_dim: 128



data_params:
  data_path: "x-ray_data"
  train_batch_size: 64
  val_batch_size:  64
  patch_size: 64
  num_workers: 2


exp_params:
  LR: 0.005
  weight_decay: 0.0
  scheduler_gamma: 0.95
  kld_weight: 0.00025
  manual_seed: 1265

trainer_params:
  accelerator: "gpu"  # Tells it to use the Colab T4
  devices: 1          # Tells it to use exactly 1 GPU
  max_epochs: 100

logging_params:
  save_dir: "/content/drive/MyDrive/VAE_Logs/" 
  name: "VanillaVAE"
  

  
