model_params:
  name: 'ConditionalVAE'
  latent_dim: 128



data_params:
  data_path: "/content/drive/MyDrive/ECE_175B_Final_Project/Chip_Layouts/Chip_Dataset_2.0.pt"
  train_batch_size: 64
  val_batch_size:  64
  patch_size: 64
  num_workers: 2


exp_params:
  LR: 0.001
  weight_decay: 0.0
  kld_weight: 0.00025
  manual_seed: 42

trainer_params:
  accelerator: "gpu"  # Tells it to use the Colab T4
  devices: 1          # Tells it to use exactly 1 GPU
  resume_ckpt_path: "/content/drive/MyDrive/ECE_175B_Final_Project/Vanilla_CVAE_Checkpoints/ConditionalVAE/version_4/checkpoints/last.ckpt"
  max_epochs: 100

logging_params:
  save_dir: "/content/drive/MyDrive/ECE_175B_Final_Project/Vanilla_CVAE_Checkpoints/"
  name: "Base_Training"
  
eval_params:
  # Swap this path when you want to evaluate different ablation models!
  ckpt_path: "/content/drive/MyDrive/ECE_175B_Final_Project/Vanilla_CVAE_Checkpoints/ConditionalVAE/version_4/checkpoints/last.ckpt"
  save_visualizations: True
  
